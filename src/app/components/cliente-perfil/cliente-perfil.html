<div class="container-fluid">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-person-circle me-2"></i>
                Mi Perfil - ISP-Manager
            </span>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm me-2" routerLink="/cliente/dashboard">
                    <i class="bi bi-arrow-left me-1"></i>
                    Volver
                </button>
                <button class="btn btn-outline-light btn-sm" (click)="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Mis Datos Personales</h4>
                </div>
                <div class="card-body">
                    <div *ngIf="loading" class="text-center py-4">
                        <div class="spinner-border text-success"></div>
                        <p>Cargando tus datos...</p>
                    </div>

                    <div *ngIf="!loading && !error">
                        <form #perfilForm="ngForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre completo</label>
                                    <input type="text" class="form-control" [(ngModel)]="perfil.nombre" name="nombre" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control" [value]="perfil.email" disabled>
                                    <small class="text-muted">El correo no se puede modificar</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Teléfono</label>
                                    <input type="tel" class="form-control" [(ngModel)]="perfil.telefono" name="telefono">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Dirección</label>
                                    <input type="text" class="form-control" [(ngModel)]="perfil.direccion" name="direccion">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Ciudad</label>
                                    <input type="text" class="form-control" [(ngModel)]="perfil.ciudad" name="ciudad">
                                </div>
                            </div>

                            <div class="alert alert-success mt-3" *ngIf="mensajeExito">
                                <i class="bi bi-check-circle me-2"></i>
                                {{ mensajeExito }}
                            </div>

                            <div class="alert alert-danger mt-3" *ngIf="mensajeError">
                                <i class="bi bi-exclamation-triangle me-2"></i>
                                {{ mensajeError }}
                            </div>

                            <div class="d-flex justify-content-end mt-4">
                                <button type="button" class="btn btn-secondary me-2" routerLink="/cliente/dashboard">
                                    Cancelar
                                </button>
                                <button type="submit" class="btn btn-success" (click)="guardarCambios()" [disabled]="perfilForm.invalid || guardando">
                                    <span *ngIf="guardando" class="spinner-border spinner-border-sm me-2"></span>
                                    {{ guardando ? 'Guardando...' : 'Guardar Cambios' }}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
