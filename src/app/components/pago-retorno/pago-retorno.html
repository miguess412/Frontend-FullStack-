<div class="container mt-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div *ngIf="status === 'procesando'" class="alert alert-info">
                <div class="spinner-border text-primary mb-3" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <h3>{{ mensaje }}</h3>
            </div>

            <div *ngIf="status === 'exitoso'" class="alert alert-success">
                <i class="bi bi-check-circle-fill fs-1"></i>
                <h2 class="mt-3">¡Pago exitoso!</h2>
                <p>{{ mensaje }}</p>
                <a routerLink="/cliente/dashboard" class="btn btn-primary mt-3">
                    Volver al dashboard
                </a>
            </div>

            <div *ngIf="status === 'cancelado'" class="alert alert-warning">
                <i class="bi bi-exclamation-triangle-fill fs-1"></i>
                <h2 class="mt-3">Pago cancelado</h2>
                <p>{{ mensaje }}</p>
                <a routerLink="/cliente/dashboard" class="btn btn-primary mt-3">
                    Volver al dashboard
                </a>
            </div>

            <div *ngIf="status === 'error'" class="alert alert-danger">
                <i class="bi bi-x-circle-fill fs-1"></i>
                <h2 class="mt-3">Error en el pago</h2>
                <p>{{ mensaje }}</p>
                <a routerLink="/cliente/dashboard" class="btn btn-primary mt-3">
                    Volver al dashboard
                </a>
            </div>
        </div>
    </div>
</div>
