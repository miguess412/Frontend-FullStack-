<div class="container-fluid">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-wifi me-2"></i>
                ISP-Manager - Gestión de Planes
            </span>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light btn-sm me-2" routerLink="/admin/dashboard">
                    <i class="bi bi-arrow-left me-1"></i>
                    Volver al Dashboard
                </button>
                <button class="btn btn-outline-light btn-sm" (click)="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>
                    Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <!-- Botón para nuevo plan -->
    <div class="row mb-4">
        <div class="col-12">
            <button class="btn btn-success" (click)="abrirModalNuevoPlan()">
                <i class="bi bi-plus-circle me-2"></i>
                Nuevo Plan
            </button>
        </div>
    </div>

    <!-- Tarjetas de planes -->
    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let plan of planes">
            <div class="card h-100 shadow-sm">
                <div class="card-header" [ngClass]="plan.activo ? 'bg-primary text-white' : 'bg-secondary text-white'">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">{{ plan.nombre }}</h5>
                        <span class="badge" [ngClass]="plan.activo ? 'bg-success' : 'bg-danger'">
                            {{ plan.activo ? 'Activo' : 'Inactivo' }}
                        </span>
                    </div>
                </div>
                <div class="card-body">
                    <p><strong>Velocidad:</strong> {{ plan.velocidad }}</p>
                    <p><strong>Precio:</strong> {{ formatMoney(plan.precio) }}</p>
                    <p><strong>Descripción:</strong> {{ plan.descripcion || 'Sin descripción' }}</p>
                </div>
                <div class="card-footer bg-transparent">
                    <button class="btn btn-sm btn-warning me-2" (click)="editarPlan(plan)">
                        <i class="bi bi-pencil"></i> Editar
                    </button>
                    <button class="btn btn-sm btn-danger" (click)="eliminarPlan(plan.id)">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal para crear/editar plan -->
<div class="modal" tabindex="-1" [class.show]="mostrarModal" style="display: block; background-color: rgba(0,0,0,0.5);" *ngIf="mostrarModal">
    <div class="modal-dialog" (click)="$event.stopPropagation()">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">{{ modalTitulo }}</h5>
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
            </div>
            <div class="modal-body">
                <form #planForm="ngForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Plan *</label>
                        <input type="text" class="form-control" [(ngModel)]="planFormData.nombre" name="nombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Velocidad</label>
                        <input type="text" class="form-control" [(ngModel)]="planFormData.velocidad" name="velocidad" placeholder="Ej: 100 Mbps">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Precio *</label>
                        <input type="number" class="form-control" [(ngModel)]="planFormData.precio" name="precio" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" rows="3" [(ngModel)]="planFormData.descripcion" name="descripcion"></textarea>
                    </div>
                    <div class="mb-3" *ngIf="editando">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" [(ngModel)]="planFormData.activo" name="activo">
                            <label class="form-check-label">Activo</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
                <button type="button" class="btn btn-primary" (click)="guardarPlan()" [disabled]="planForm.invalid">
                    <i class="bi bi-save me-2"></i>
                    Guardar
                </button>
            </div>
        </div>
    </div>
</div>
